<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giovanni's — Asistente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .chat-wrapper { width: 100%; max-width: 460px; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.35); display: flex; flex-direction: column; height: 620px; }
    .chat-header { background: #c0392b; padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-info p { color: #fff; font-size: 15px; font-weight: 600; margin: 0; }
    .header-info span { color: rgba(255,255,255,0.8); font-size: 12px; }
    .messages { flex: 1; overflow-y: auto; padding: 14px; background: #f0f0f0; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 82%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .msg.bot { background: #fff; align-self: flex-start; border-bottom-left-radius: 3px; color: #222; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .msg.user { background: #c0392b; color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
    .msg.system { background: #e8f5e9; align-self: center; border-radius: 8px; color: #2e7d32; font-size: 12px; text-align: center; padding: 6px 12px; max-width: 90%; }
    .msg.typing { background: #fff; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #aaa; margin: 0 2px; animation: bounce 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: #f9f9f9; border-top: 1px solid #eee; flex-shrink: 0; }
    .qbtn { font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 1px solid #c0392b; color: #c0392b; background: transparent; cursor: pointer; transition: all 0.15s; }
    .qbtn:hover { background: #c0392b; color: #fff; }
    .input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #eee; background: #fff; flex-shrink: 0; }
    .input-row input { flex: 1; font-size: 14px; padding: 9px 14px; border-radius: 22px; border: 1px solid #ddd; outline: none; color: #222; background: #f7f7f7; transition: border-color 0.15s; }
    .input-row input:focus { border-color: #c0392b; background: #fff; }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: #c0392b; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="header-avatar">🍕</div>
    <div class="header-info">
      <p>Giovanni's</p>
      <span>Pizzería · Williams Morris</span>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="quick-btns">
    <button class="qbtn" onclick="sendQuick('Ver el menú de pizzas')">🍕 Pizzas</button>
    <button class="qbtn" onclick="sendQuick('Ver promos disponibles')">🎁 Promos</button>
    <button class="qbtn" onclick="sendQuick('Quiero hacer un pedido')">📝 Pedir</button>
    <button class="qbtn" onclick="sendQuick('¿Cuáles son los horarios?')">🕐 Horarios</button>
    <button class="qbtn" onclick="sendQuick('¿Cómo llego?')">📍 Dirección</button>
    <button class="qbtn" onclick="sendQuick('Qué gustos de empanadas tienen?')">🥟 Empanadas</button>
  </div>
  <div class="input-row">
    <input id="user-input" type="text" placeholder="Escribí tu consulta..." onkeydown="if(event.key==='Enter') sendMsg()" />
    <button class="send-btn" onclick="sendMsg()" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>
<script>
const msgs = document.getElementById('messages');
let history = [];
function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerText = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg typing'; div.id = 'typing';
  div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
